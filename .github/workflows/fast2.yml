name: CI - Automated Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  unit-tests:
    name: ✅ Unit Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit
        timeout-minutes: 3

      - name: 🧪 Run unit tests
        run: npm run test:unit -- --passWithNoTests

  e2e-tests:
    name: 🌐 E2E Tests (Puppeteer)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit
        timeout-minutes: 3

      - name: 🔧 Install minimal deps
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq libgbm1 libasound2 libxrandr2 libgtk-3-0 libx11-xcb1 libnss3 2>/dev/null || true

      - name: 🌐 Run E2E tests
        run: npm run test:e2e
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: false
